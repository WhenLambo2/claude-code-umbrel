version: "3.8"

services:
  claude-code:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-code
    restart: unless-stopped
    ports:
      - "7681:7681"
    user: root
    tty: true
    stdin_open: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    entrypoint: ["/bin/sh", "-c", "/workspace/ai-cos/system/run-bot.sh & exec ttyd --writable --port 7681 --ping-interval 30 --max-clients 5 /usr/local/bin/attach-session.sh"]
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - NODE_OPTIONS=--max-old-space-size=4096
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - ENABLE_FIREWALL=false
    volumes:
      - claude-config:/home/node/.claude
      - claude-history:/commandhistory
      - claude-workspace:/workspace
      - /mnt/umbrel/home/ai-cos:/workspace/ai-cos

volumes:
  claude-config:
    name: claude-config
  claude-history:
    name: claude-history
  claude-workspace:
    name: claude-workspace