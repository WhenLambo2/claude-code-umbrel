version: "3.8"

services:
  claude-code:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-code
    restart: unless-stopped
    network_mode: host
    user: root
    tty: true
    stdin_open: true
    dns:
      - 1.1.1.1
      - 1.0.0.1
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # start-services.sh handles: run-bot.sh (bg) + sshd (2222) + ttyd side (7682) + ttyd main (7681, fg)
    entrypoint: ["/usr/local/bin/start-services.sh"]
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - NODE_OPTIONS=--max-old-space-size=4096
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - ENABLE_FIREWALL=false
    volumes:
      - claude-config:/home/node/.claude
      - claude-history:/commandhistory
      - claude-workspace:/workspace
      - /mnt/ai-cos:/workspace/ai-cos
      - /mnt/openclaw-config:/workspace/ai-cos/mounts/openclaw-config
      - /mnt/home-assistant:/workspace/ai-cos/mounts/home-assistant
      - /mnt/pi-hole:/workspace/ai-cos/mounts/pi-hole
      - /mnt/tailscale:/workspace/ai-cos/mounts/tailscale

volumes:
  claude-config:
    name: claude-config
  claude-history:
    name: claude-history
  claude-workspace:
    name: claude-workspace